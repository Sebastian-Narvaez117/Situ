{% extends "./base.html" %}
{% block title %}
    Pasaje
{% endblock %}


{% block body %}

<h2>¿Seguro que quieres eliminar?</h2>

<p>{{ pasajero.nombre }} {{ pasajero.apellido }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
</form>

<a href="{% url 'pasajeros' %}" class="btn btn-secondary">Cancelar</a>


{% endblock body %}
